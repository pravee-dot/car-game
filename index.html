<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <!-- இந்த line மிக முக்கியம் — mobile zoom disable பண்றது -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Car Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      /* Mobile-இல் scroll, zoom ஆகாம இருக்க */
      overflow: hidden;
      touch-action: none;
    }

    #scoreBoard {
      color: #ffffff;
      font-size: 18px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    canvas {
      background: #2d2d2d;
      border: 3px solid #444;
      border-radius: 8px;
      display: block;
    }

    /* Game Over overlay */
    #gameOverScreen {
      display: none;
      position: absolute;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0,0,0,0.80);
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      z-index: 10;
    }
    #gameOverScreen h2 { color: #ff4d4d; font-size: 28px; }
    #gameOverScreen p  { color: #ccc; font-size: 15px; }
    #restartBtn {
      padding: 10px 28px;
      font-size: 16px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #restartBtn:hover { background: #c73652; }

    /* ── Mobile touch buttons ── */
    #touchControls {
      display: flex;
      gap: 40px;
      margin-top: 16px;
    }
    #touchControls button {
      width: 75px;
      height: 75px;
      font-size: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 2px solid rgba(255,255,255,0.35);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #touchControls button:active {
      background: rgba(255,255,255,0.30);
    }
  </style>
</head>
<body>

  <div id="scoreBoard">Score: 0</div>
  <canvas id="gameCanvas"></canvas>

  <!-- Touch buttons — mobile-இல் தெரியும், desktop-இலும் work ஆகும் -->
  <div id="touchControls">
    <button id="leftBtn">&#8592;</button>
    <button id="rightBtn">&#8594;</button>
  </div>

  <div id="gameOverScreen">
    <h2>Game Over!</h2>
    <p id="finalScore">Your score: 0</p>
    <button id="restartBtn">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    // ── Screen size-க்கு canvas fit பண்றோம் ──
    const isMobile  = window.innerWidth < 500;
    canvas.width    = isMobile ? Math.min(window.innerWidth - 16, 380) : 400;
    canvas.height   = isMobile ? Math.floor(window.innerHeight * 0.60) : 600;

    const scoreBoard     = document.getElementById('scoreBoard');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreEl   = document.getElementById('finalScore');
    const restartBtn     = document.getElementById('restartBtn');

    let score       = 0;
    let gameRunning = true;
    let frameCount  = 0;
    let gameSpeed   = 4;

    // Road boundaries (scaled to canvas width)
    const roadLeft  = canvas.width * 0.15;
    const roadRight = canvas.width * 0.85;

    // ── Player ──
    const player = {
      x: canvas.width / 2 - 20,
      y: canvas.height - 90,
      width: 40,
      height: 70,
      speed: 5,
      color: '#00d4ff',
      movingLeft: false,
      movingRight: false
    };

    // ── Lane lines ──
    const laneLines     = [];
    const laneLineH     = 60;
    const laneLineGap   = 40;
    const laneLineW     = 8;
    for (let i = 0; i < 10; i++) {
      laneLines.push({ x: canvas.width / 2 - 4, y: i * (laneLineH + laneLineGap) });
    }

    // ── Enemies ──
    const enemies      = [];
    const enemyColors  = ['#ff4d4d','#ff9f43','#ff6b9d','#a29bfe'];
    const lanes        = [
      roadLeft + 20,
      canvas.width / 2 - 20,
      roadRight - 60
    ];

    function createEnemy(index) {
      return {
        x:      lanes[Math.floor(Math.random() * lanes.length)],
        y:      -100 - index * 220,
        width:  40,
        height: 70,
        color:  enemyColors[Math.floor(Math.random() * enemyColors.length)],
        speed:  gameSpeed + Math.random() * 2
      };
    }
    for (let i = 0; i < 3; i++) enemies.push(createEnemy(i));

    // ── Keyboard input ──
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft')  player.movingLeft  = true;
      if (e.key === 'ArrowRight') player.movingRight = true;
    });
    document.addEventListener('keyup', function(e) {
      if (e.key === 'ArrowLeft')  player.movingLeft  = false;
      if (e.key === 'ArrowRight') player.movingRight = false;
    });

    // ── Touch input (mobile) ──
    const leftBtn  = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');

    leftBtn.addEventListener('touchstart',  function(e) { e.preventDefault(); player.movingLeft  = true;  });
    leftBtn.addEventListener('touchend',    function()  { player.movingLeft  = false; });
    leftBtn.addEventListener('touchcancel', function()  { player.movingLeft  = false; });

    rightBtn.addEventListener('touchstart',  function(e) { e.preventDefault(); player.movingRight = true;  });
    rightBtn.addEventListener('touchend',    function()  { player.movingRight = false; });
    rightBtn.addEventListener('touchcancel', function()  { player.movingRight = false; });

    // Mouse support (desktop button click panning)
    leftBtn.addEventListener('mousedown',  function() { player.movingLeft  = true;  });
    leftBtn.addEventListener('mouseup',    function() { player.movingLeft  = false; });
    rightBtn.addEventListener('mousedown', function() { player.movingRight = true;  });
    rightBtn.addEventListener('mouseup',   function() { player.movingRight = false; });

    // ── Draw functions ──
    function drawRoad() {
      ctx.fillStyle = '#3d3d3d';
      ctx.fillRect(roadLeft, 0, roadRight - roadLeft, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(roadLeft - 10, 0, 10, canvas.height);
      ctx.fillRect(roadRight,     0, 10, canvas.height);
    }

    function drawLaneLines() {
      ctx.fillStyle = '#ffffff';
      laneLines.forEach(function(line) {
        line.y += gameSpeed;
        if (line.y > canvas.height) line.y = -laneLineH;
        ctx.fillRect(line.x, line.y, laneLineW, laneLineH);
      });
    }

    function drawCar(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 6);
      ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x + 6, y + 8,      w - 12, 18);
      ctx.fillRect(x + 6, y + h - 26, w - 12, 16);
      ctx.fillStyle = '#fffde7';
      ctx.fillRect(x + 4,      y + h - 12, 10, 8);
      ctx.fillRect(x + w - 14, y + h - 12, 10, 8);
    }

    function drawEnemies() {
      enemies.forEach(function(enemy, i) {
        enemy.y += enemy.speed;
        if (enemy.y > canvas.height + 50) {
          enemies[i]   = createEnemy(0);
          enemies[i].y = -100;
        }
        drawCar(enemy.x, enemy.y, enemy.width, enemy.height, enemy.color);
      });
    }

    function drawPlayer() {
      if (player.movingLeft) {
        player.x -= player.speed;
        if (player.x < roadLeft + 5) player.x = roadLeft + 5;
      }
      if (player.movingRight) {
        player.x += player.speed;
        if (player.x + player.width > roadRight - 5) player.x = roadRight - player.width - 5;
      }
      drawCar(player.x, player.y, player.width, player.height, player.color);
    }

    function checkCollision() {
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (
          player.x < e.x + e.width  &&
          player.x + player.width > e.x &&
          player.y < e.y + e.height &&
          player.y + player.height > e.y
        ) { endGame(); }
      }
    }

    function updateScore() {
      frameCount++;
      if (frameCount % 6 === 0) {
        score++;
        scoreBoard.textContent = 'Score: ' + score;
      }
      if (score > 0 && score % 500 === 0 && gameSpeed < 12) gameSpeed += 0.5;
    }

    function endGame() {
      gameRunning = false;
      finalScoreEl.textContent = 'Your score: ' + score;
      gameOverScreen.style.display = 'flex';
    }

    restartBtn.addEventListener('click', function() {
      score = 0; frameCount = 0; gameSpeed = 4; gameRunning = true;
      player.x = canvas.width / 2 - 20;
      player.movingLeft = player.movingRight = false;
      for (let i = 0; i < enemies.length; i++) enemies[i] = createEnemy(i);
      for (let i = 0; i < laneLines.length; i++) laneLines[i].y = i * (laneLineH + laneLineGap);
      gameOverScreen.style.display = 'none';
      scoreBoard.textContent = 'Score: 0';
      requestAnimationFrame(gameLoop);
    });

    function gameLoop() {
      if (!gameRunning) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawRoad();
      drawLaneLines();
      drawEnemies();
      drawPlayer();
      checkCollision();
      updateScore();
      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
